<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkwell — One step at a time.</title>
  <meta name="description" content="Inkwell is a minimalist iOS goal tracker. Set a goal, fill the grid, watch it happen. Coming soon to the App Store.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #FAF7F4;
      color: #1C2B4A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* App Icon */
    .icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(28,43,74,0.15), 0 2px 8px rgba(28,43,74,0.08);
      margin-bottom: 28px;
      flex-shrink: 0;
    }
    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Placeholder shown when no icon image is set */
    .icon-placeholder {
      display: none;
    }

    /* App name */
    .app-name {
      font-size: 36px;
      font-weight: 600;
      color: #1C2B4A;
      letter-spacing: -0.8px;
      line-height: 1;
      margin-bottom: 10px;
    }

    /* Tagline */
    .tagline {
      font-size: 18px;
      font-weight: 400;
      color: #9E8672;
      letter-spacing: -0.2px;
      line-height: 1.4;
      margin-bottom: 40px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: #EDE4D9;
      border-radius: 1px;
      margin-bottom: 40px;
    }

    /* Email form */
    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .email-input {
      width: 100%;
      height: 52px;
      padding: 0 18px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #1C2B4A;
      background: #FFFFFF;
      border: 1px solid #EDE4D9;
      border-radius: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input::placeholder { color: #B8A99A; }
    .email-input:focus { border-color: #1C2B4A; }

    .submit-btn {
      width: 100%;
      height: 52px;
      background: #1C2B4A;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: -0.2px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.98); }

    /* Success state */
    .success-msg {
      display: none;
      width: 100%;
      height: 52px;
      background: rgba(74,124,89,0.08);
      border: 1px solid rgba(74,124,89,0.2);
      border-radius: 14px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #4A7C59;
    }
    .success-msg.visible { display: flex; }

    /* Coming soon label */
    .coming-soon {
      font-size: 12px;
      font-weight: 500;
      color: #B8A99A;
      letter-spacing: 0.03em;
    }

    /* App Store badge area */
    .badge-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #EDE4D9;
    }

    /* Feature pills */
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 48px;
    }
    .pill {
      background: white;
      border: 1px solid #EDE4D9;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: #9E8672;
      white-space: nowrap;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #C4B8AC;
      font-weight: 400;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .app-name { font-size: 30px; }
      .tagline { font-size: 16px; }
      footer { position: static; margin-top: 48px; }
    }
  </style>
</head>
<body>

<div class="container">

    <!-- Icon -->
  <div class="icon-wrap">
    <img src="icon.png" alt="Inkwell app icon">
    <div class="icon-placeholder" style="width:100%;height:100%;background:#FAF7F4;display:none;align-items:center;justify-content:center;font-size:48px;">🖊️</div>
  </div>

  <!-- Name & tagline -->
  <h1 class="app-name">Inkwell</h1>
  <p class="tagline">One step at a time.</p>

  <div class="divider"></div>

  <!-- Email form -->
  <form class="form" id="waitlistForm" onsubmit="handleSubmit(event)">
    <input
      class="email-input"
      type="email"
      id="emailInput"
      placeholder="your@email.com"
      required
      autocomplete="email"
    >
    <button class="submit-btn" type="submit">
      Join the waitlist
    </button>
  </form>

  <div class="success-msg" id="successMsg">
    ✓ &nbsp; You're on the list — we'll let you know when we launch
  </div>

  <!-- Coming soon -->
  <p class="coming-soon">Coming soon to the App Store</p>

  <!-- Feature pills -->
  <div class="features">
    <span class="pill">Goal tracking</span>
    <span class="pill">Visual grid</span>
    <span class="pill">No streaks</span>
    <span class="pill">One-time purchase</span>
    <span class="pill">iOS</span>
  </div>

</div>

<footer>inkwellapp.io</footer>

<script>
  function handleSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value;

    // Hide form, show success
    document.getElementById('waitlistForm').style.display = 'none';
    const msg = document.getElementById('successMsg');
    msg.classList.add('visible');

    // TODO: Replace this with your Mailchimp form action URL
    // fetch('YOUR_MAILCHIMP_URL', { method: 'POST', body: ... })
    console.log('Email submitted:', email);
  }
</script>

</body>
</html>
